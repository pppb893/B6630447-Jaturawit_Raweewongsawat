apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: my-nginx
spec:
  replicas: 3 # รัน Pod พร้อมกัน 3 ตัวเพื่อทำ Load Balancing
  selector:
    matchLabels:
      app: my-nginx
  template:
    metadata:
      labels:
        app: my-nginx
    spec:
      containers:
      - name: nginx-container
        image: nginx
        ports:
        - containerPort: 80
        resources: # กำหนดการใช้ Resource (วิศวกรที่ดีต้องใส่เสมอ)
          limits:
            cpu: "500m"
            memory: "128Mi"
          requests:
            cpu: "256m"
            memory: "64Mi"